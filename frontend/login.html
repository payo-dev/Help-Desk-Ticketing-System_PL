<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Help-Desk-Ticketing — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Added Poppins Font for a beautiful, modern look -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in-up {
      animation: fadeInUp 0.5s ease-out both;
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-50 p-4">

  <!-- Main Split Card -->
  <div
    class="bg-white rounded-2xl md:rounded-[2rem] shadow-2xl flex flex-col md:flex-row max-w-5xl w-full md:min-h-[600px] overflow-hidden animate-fade-in-up">

    <!-- Left Side: Login Form -->
    <div class="w-full md:w-1/2 px-6 py-8 sm:p-10 md:p-16 flex flex-col justify-center">

      <!-- Brand Logo Area -->
      <div class="flex items-center gap-3 mb-8 md:mb-10">
        <div
          class="flex items-center justify-center w-10 h-10 bg-gradient-to-br from-purple-500 to-indigo-600 rounded-xl shadow-lg shadow-purple-200">
          <!-- Monitor/Desk Icon -->
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
            </path>
          </svg>
        </div>
        <span
          class="font-extrabold text-xl bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 tracking-tight">
          Help-Desk
        </span>
      </div>

      <!-- Welcome Text -->
      <div class="mb-6 md:mb-8">
        <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold text-gray-900 mb-3 leading-tight tracking-tight">
          Holla,<br>Welcome Back</h1>
        <p class="text-sm text-gray-500 font-medium tracking-wide">Hey, welcome back to your special place</p>
      </div>

      <!-- Hidden Error Message for auth.js -->
      <div id="error-msg" class="hidden bg-red-100 text-red-600 text-sm px-4 py-3 rounded-lg mb-4"></div>

      <!-- Form Inputs -->
      <form id="login-form" class="space-y-4" onsubmit="return false;">
        <div>
          <input type="email" id="email" placeholder="Email address"
            class="w-full px-5 py-3.5 border border-gray-200 rounded-xl text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition shadow-sm font-medium" />
        </div>
        <div>
          <input type="password" id="password" placeholder="Password"
            class="w-full px-5 py-3.5 border border-gray-200 rounded-xl text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-200 transition shadow-sm font-medium" />
        </div>

        <!-- Form Options -->
        <div class="flex items-center justify-between text-xs mt-4 mb-8">
          <label class="flex items-center text-gray-500 cursor-pointer font-medium hover:text-purple-600 transition">
            <input type="checkbox"
              class="mr-2 w-4 h-4 rounded text-purple-600 focus:ring-purple-500 border-gray-300 accent-purple-600">
            Remember me
          </label>
          <a href="#" class="text-gray-500 font-medium hover:text-purple-600 transition">Forgot Password?</a>
        </div>

        <!-- Submit Button -->
        <div>
          <button id="login-btn" type="submit"
            class="w-full sm:w-auto bg-[#8b5cf6] hover:bg-[#7c3aed] text-white font-bold rounded-xl text-sm px-10 py-3.5 transition shadow-lg shadow-purple-500/40 tracking-wide">
            Sign In
          </button>
        </div>
      </form>

    </div>

    <!-- Right Side: Decorative Illustration Panel -->
    <div class="hidden md:flex w-1/2 p-4">
      <div
        class="w-full h-full bg-gradient-to-br from-[#a78bfa] via-[#8b5cf6] to-[#7c3aed] rounded-3xl relative overflow-hidden flex items-center justify-center">

        <!-- Abstract Cloud Shapes -->
        <div class="absolute top-12 left-8 w-32 h-16 bg-white/20 rounded-full blur-2xl"></div>
        <div class="absolute top-8 left-12 w-24 h-12 bg-white rounded-full opacity-90 shadow-lg"></div>
        <div class="absolute bottom-16 right-10 w-40 h-20 bg-white/20 rounded-full blur-2xl"></div>
        <div class="absolute -bottom-4 right-16 w-48 h-20 bg-white rounded-full opacity-90 shadow-lg"></div>

        <!-- Central Illustration Composition -->
        <div class="relative w-full h-full flex items-center justify-center">

          <!-- Checkmark Bubble Float -->
          <div
            class="absolute top-1/4 left-6 w-16 h-16 bg-white rounded-full shadow-xl flex items-center justify-center z-10 animate-bounce"
            style="animation-duration: 3s;">
            <svg class="w-8 h-8 text-[#8b5cf6]" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
            </svg>
            <!-- Tail of speech bubble -->
            <div class="absolute -bottom-2 -right-1 w-6 h-6 bg-white rotate-45 rounded-sm -z-10"></div>
          </div>

          <!-- Laptop Graphic -->
          <div class="flex flex-col items-center justify-center rotate-[-5deg] z-0">

            <!-- Laptop Screen/Lid -->
            <div
              class="w-[320px] h-[210px] border-[8px] border-gray-900 rounded-t-2xl rounded-b-sm bg-gradient-to-b from-pink-300 to-purple-400 relative shadow-2xl overflow-hidden flex flex-col items-center justify-center">
              <!-- Webcam dot -->
              <div class="absolute top-1.5 w-1.5 h-1.5 bg-gray-900 rounded-full"></div>

              <!-- Fingerprint Display -->
              <div
                class="w-16 h-16 border-2 border-white/60 rounded-full flex items-center justify-center text-white mb-4 bg-white/20 shadow-[0_0_15px_rgba(255,255,255,0.5)]">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4">
                  </path>
                </svg>
              </div>

              <!-- Loading Bar -->
              <div class="w-28 h-1.5 bg-white/30 rounded-full overflow-hidden mb-2">
                <div class="w-1/2 h-full bg-white rounded-full"></div>
              </div>

              <!-- Updated Text -->
              <p class="text-[12px] text-white mt-1 text-center font-semibold tracking-wide leading-tight">
                Welcome,<br>please login</p>
            </div>

            <!-- Laptop Base/Keyboard Deck -->
            <div
              class="w-[380px] h-[18px] bg-gray-300 rounded-b-xl border-t-[3px] border-gray-400 shadow-2xl relative flex justify-center">
              <!-- Trackpad notch -->
              <div class="w-16 h-1.5 bg-gray-400 rounded-b-md"></div>
            </div>

          </div>

          <!-- Lock Graphic Float -->
          <div
            class="absolute right-4 bottom-1/4 w-20 h-24 z-10 flex flex-col items-center justify-center hover:-translate-y-2 transition duration-500">
            <!-- Lock Shackle -->
            <div class="w-10 h-12 border-[5px] border-white rounded-t-full -mb-2 z-0"></div>
            <!-- Lock Body -->
            <div class="w-16 h-14 bg-white rounded-xl z-10 shadow-2xl flex items-center justify-center">
              <div class="w-2.5 h-4 bg-[#8b5cf6] rounded-full shadow-inner"></div>
            </div>
          </div>

        </div>
      </div>
    </div>

  </div>

  <script src="js/auth.js"></script>
</body>

</html>
