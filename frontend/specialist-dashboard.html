<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Workspace | IT Specialist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#f8f9fa] flex min-h-screen">

  <aside class="w-64 bg-white border-r border-gray-100 flex flex-col fixed h-full z-20 shadow-sm">
    <div class="px-8 py-6 flex items-center gap-3 border-b border-gray-50">
      <div class="flex items-center justify-center w-8 h-8 bg-indigo-600 rounded-lg shadow-sm shadow-indigo-200 text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
      </div>
      <div>
        <h1 class="text-lg font-bold text-gray-900 leading-none">Help-Desk</h1>
        <p class="text-[10px] text-indigo-600 font-bold uppercase tracking-wider mt-1">IT Workspace</p>
      </div>
    </div>

    <nav class="flex-1 px-4 py-6 space-y-1.5">
      <a href="specialist-dashboard.html" class="nav-link flex items-center gap-3 px-4 py-2.5 rounded-xl bg-indigo-50 text-indigo-700 font-semibold text-sm transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
        My Ticket Queue
      </a>
      <a href="assets.html" class="nav-link flex items-center gap-3 px-4 py-2.5 rounded-xl hover:bg-gray-50 text-gray-500 hover:text-gray-900 font-medium text-sm transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
        Hardware Assets
      </a>
      <a href="knowledge-base.html" class="nav-link flex items-center gap-3 px-4 py-2.5 rounded-xl hover:bg-gray-50 text-gray-500 hover:text-gray-900 font-medium text-sm transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
        Knowledge Base
      </a>
    </nav>
  </aside>

  <main class="ml-64 flex-1 p-10">
    
    <div class="mb-10">
      <h2 class="text-3xl font-bold text-gray-900">My Workspace</h2>
      <p class="text-gray-500 mt-1 text-sm">Manage your active assignments and pull from the unassigned pool.</p>
    </div>

    <div class="mb-12">
      <h3 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-indigo-500"></span> My Active Tickets
      </h3>
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <table class="w-full text-sm text-left">
          <thead class="bg-gray-50 text-gray-500 uppercase text-xs font-semibold border-b border-gray-100">
            <tr>
              <th class="px-6 py-4">Ticket</th>
              <th class="px-6 py-4">Status</th>
              <th class="px-6 py-4">Action</th>
            </tr>
          </thead>
          <tbody id="my-tickets-tbody" class="divide-y divide-gray-50"></tbody>
        </table>
      </div>
    </div>

    <div>
      <h3 class="text-lg font-bold text-gray-900 mb-4 flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-yellow-400"></span> Unassigned IT Tickets
      </h3>
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <table class="w-full text-sm text-left">
          <thead class="bg-gray-50 text-gray-500 uppercase text-xs font-semibold border-b border-gray-100">
            <tr>
              <th class="px-6 py-4">Ticket</th>
              <th class="px-6 py-4">Priority</th>
              <th class="px-6 py-4">Action</th>
            </tr>
          </thead>
          <tbody id="pool-tickets-tbody" class="divide-y divide-gray-50"></tbody>
        </table>
      </div>
    </div>

  </main>

  <div id="workModal" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm hidden flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-8 m-4">
      <h3 class="text-xl font-bold text-gray-900 mb-1" id="work-ticket-number">TK-XXXX</h3>
      <p class="text-sm font-semibold text-gray-700 mb-6" id="work-ticket-title">Loading...</p>

      <div class="p-4 bg-gray-50 rounded-xl border border-gray-100 mb-6 text-sm text-gray-600" id="work-ticket-desc"></div>

      <div class="mb-6">
        <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Update Status</label>
        <div class="flex gap-2">
          <select id="update-status-select" class="flex-1 p-2.5 bg-white border border-gray-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="In Progress">In Progress</option>
            <option value="Pending User">Pending User Input</option>
            <option value="Resolved">Resolved</option>
          </select>
          <button onclick="saveStatus()" class="px-4 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg text-sm transition">Update</button>
        </div>
      </div>

      <div class="border-t border-gray-200 my-6"></div>

      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Misrouted? Transfer Ticket</label>
        <div class="flex gap-2">
          <select id="transfer-dept-select" class="flex-1 p-2.5 bg-white border border-gray-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-red-500">
            <option value="2">Human Resources</option>
            <option value="3">Finance</option>
            <option value="4">General Operations</option>
          </select>
          <button onclick="transferTicket()" class="px-4 py-2.5 bg-white border border-red-200 text-red-600 hover:bg-red-50 font-medium rounded-lg text-sm transition">Transfer</button>
        </div>
      </div>

      <div class="mt-8 flex justify-end">
        <button onclick="toggleWorkModal(false)" class="px-5 py-2 text-gray-500 font-medium hover:bg-gray-100 rounded-lg transition">Close Window</button>
      </div>
    </div>
  </div>

  <script src="js/specialist.js"></script>
</body>
</html>
