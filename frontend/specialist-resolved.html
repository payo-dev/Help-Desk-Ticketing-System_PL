<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resolved Tickets | Help-Desk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .slide-in { animation: slideIn 0.3s ease; }
  </style>
</head>
<body class="bg-[#f8f9fa] text-gray-800 flex min-h-screen">

  <!-- ===== SIDEBAR ===== -->
  <aside class="w-64 bg-white border-r border-gray-100 flex flex-col fixed h-full z-20 shadow-[4px_0_24px_rgba(0,0,0,0.02)]">

    <div class="px-8 py-6 flex items-center gap-3">
      <div id="sidebar-icon" class="flex items-center justify-center w-8 h-8 bg-[#10b981] rounded-lg shadow-sm text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
      </div>
      <div>
        <h1 class="text-lg font-bold text-gray-900 tracking-tight leading-none">Help-Desk</h1>
        <p class="text-[10px] font-bold uppercase tracking-wider mt-1" id="sidebar-dept-label">Specialist</p>
      </div>
    </div>

    <nav class="flex-1 px-4 py-4 space-y-1.5 overflow-y-auto">
      <p class="px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-2">My Workspace</p>

      <a href="specialist-dashboard.html" id="nav-queue" class="nav-link flex items-center gap-3 px-4 py-2.5 rounded-xl hover:bg-gray-50 text-gray-500 hover:text-gray-900 font-medium text-sm transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
        My Ticket Queue
      </a>

      <a href="specialist-resolved.html" id="nav-resolved" class="nav-link flex items-center gap-3 px-4 py-2.5 rounded-xl bg-[#ecfdf5] text-[#10b981] font-semibold text-sm transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        Resolved Tickets
      </a>

      <a href="specialist-kb.html" class="nav-link flex items-center gap-3 px-4 py-2.5 rounded-xl hover:bg-gray-50 text-gray-500 hover:text-gray-900 font-medium text-sm transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
        Knowledge Base
      </a>
    </nav>

    <div class="px-6 py-5 border-t border-gray-100">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-10 h-10 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold text-sm" id="user-avatar">?</div>
        <div>
          <p class="text-sm font-semibold text-gray-900 leading-tight" id="user-name">Loading...</p>
          <p class="text-xs text-gray-500 font-medium" id="user-role">Specialist</p>
        </div>
      </div>
      <button onclick="logout()" class="w-full py-2.5 flex items-center justify-center gap-2 text-gray-500 hover:bg-red-50 hover:text-red-600 text-sm font-medium rounded-xl transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
        Log out
      </button>
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="ml-64 flex-1 flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-[#f8f9fa] px-8 py-6 flex items-center justify-between sticky top-0 z-10">
      <div>
        <div class="flex items-center gap-3 mb-1">
          <!-- Dynamic dept badge -->
          <span id="dept-badge" class="text-xs font-bold uppercase px-3 py-1 rounded-full bg-green-100 text-green-700">All</span>
        </div>
        <h2 class="text-2xl font-bold text-gray-900" id="page-title">Resolved Tickets</h2>
        <p class="text-sm text-gray-500" id="page-subtitle">History of tickets resolved by your department.</p>
      </div>
      <div class="flex items-center gap-3">
        <div class="text-right">
          <p class="text-xs text-gray-400 font-medium">Total Resolved</p>
          <p class="text-2xl font-bold text-[#10b981]" id="header-resolved-count">0</p>
        </div>
      </div>
    </header>

    <div class="px-8 pb-8 flex-1">

      <div id="view-resolved" class="space-y-6 mt-4">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="w-2 h-2 rounded-full bg-[#10b981]"></span>
              <h3 class="text-base font-bold text-gray-900">My Resolved Tickets</h3>
            </div>
          </div>
          <table class="w-full text-sm text-left">
            <thead class="bg-gray-50 text-gray-400 uppercase text-xs font-semibold border-b border-gray-100">
              <tr>
                <th class="px-6 py-4">Ticket</th>
                <th class="px-6 py-4">Category</th>
                <th class="px-6 py-4">Priority</th>
                <th class="px-6 py-4">Status</th>
                <th class="px-6 py-4">Resolved Date</th>
              </tr>
            </thead>
            <tbody id="resolved-tickets-tbody" class="divide-y divide-gray-50">
              <tr><td colspan="5" class="text-center py-8 text-gray-400">Loading resolved tickets...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/specialist-resolved.js"></script>
</body>
</html>
