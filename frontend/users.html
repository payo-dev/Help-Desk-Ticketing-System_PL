    <div class="px-6 py-5 border-t border-gray-100">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-10 h-10 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold text-sm">
          UI
        </div>
        <div>
          <p class="text-sm font-semibold text-gray-900 leading-tight" id="user-name">Loading...</p>
          <p class="text-xs text-gray-500 font-medium" id="user-role">Role</p>
        </div>
      </div>
      <button onclick="logout()" class="w-full py-2.5 flex items-center justify-center gap-2 text-gray-500 hover:bg-red-50 hover:text-red-600 text-sm font-medium rounded-xl transition">

        Log out
      </button>
    </div>

  <main class="ml-64 flex-1 p-8">
    
    <div class="mb-8 flex justify-between items-end">
      <div>
        <h2 class="text-3xl font-bold text-gray-900">User Management</h2>
        <p class="text-gray-500 mt-1">Manage employees, IT specialists, and administrators.</p>
      </div>
      <button onclick="toggleUserModal(true)" class="bg-[#10b981] text-white px-6 py-3 rounded-xl font-medium hover:bg-[#059669] transition shadow-lg shadow-green-200 flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
        Add New User
      </button>
    </div>

    <div class="flex gap-4 mb-6">
      <div class="relative flex-1">
        <input type="text" id="userSearch" placeholder="Search by name or email..." class="w-full pl-10 pr-4 py-3 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#10b981] outline-none">
        <svg class="w-5 h-5 absolute left-3 top-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </div>
      <select id="roleFilter" class="px-4 py-3 bg-white border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#10b981]">
        <option value="all">All Roles</option>
        <option value="Admin">Admin</option>
        <option value="IT Specialist">IT Specialist</option>
        <option value="Employee">Employee</option>
      </select>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">User</th>
            <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">Role</th>
            <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">Department</th>
            <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase">Status</th>
          </tr>
        </thead>
        <tbody id="users-tbody" class="divide-y divide-gray-200">
          </tbody>
      </table>
    </div>
  </main>

  <div id="addUserModal" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm hidden flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-8 m-4">
      <h3 class="text-xl font-bold text-gray-900 mb-6">Create New User</h3>
      
      <form id="addUserForm" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">First Name</label>
            <input type="text" id="uFirstName" required class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 outline-none focus:border-[#10b981]">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Last Name</label>
            <input type="text" id="uLastName" required class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 outline-none focus:border-[#10b981]">
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Email Address</label>
          <input type="email" id="uEmail" required class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 outline-none focus:border-[#10b981]">
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Temporary Password</label>
          <input type="password" id="uPassword" required class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 outline-none focus:border-[#10b981]">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">System Role</label>
            <select id="uRole" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 outline-none">
              <option value="1">Admin</option>
              <option value="2">IT Specialist</option>
              <option value="3">Employee</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Department</label>
            <select id="uDepartment" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 outline-none">
              <option value="1">IT Department</option>
              <option value="2">Human Resources</option>
              <option value="3">Finance</option>
              <option value="4">General Operations</option>
            </select>
          </div>
        </div>

        <div class="flex justify-end gap-3 pt-6 border-t border-gray-100">
          <button type="button" onclick="toggleUserModal(false)" class="px-5 py-2.5 text-gray-500 font-medium hover:bg-gray-100 rounded-xl">Cancel</button>
          <button type="submit" class="px-5 py-2.5 bg-[#10b981] text-white font-medium rounded-xl hover:bg-[#059669]">Create User</button>
        </div>
      </form>
    </div>
  </div>
   <script src="js/app.js"></script>
  <script src="js/users.js"></script>
</body>
